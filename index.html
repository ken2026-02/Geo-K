<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/favicon-64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        background: #f5f5f4;
      }

      .boot-splash {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(79, 70, 229, 0.12), transparent 36%),
          linear-gradient(180deg, #f8fafc 0%, #f5f5f4 100%);
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      .boot-splash__card {
        width: min(100%, 420px);
        border-radius: 28px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        padding: 28px 24px;
        text-align: center;
      }

      .boot-splash__mark {
        width: 84px;
        height: 84px;
        margin: 0 auto 18px;
        border-radius: 24px;
        background: linear-gradient(135deg, #1e293b 0%, #4f46e5 100%);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .boot-splash__title {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
        color: #0f172a;
      }

      .boot-splash__subtitle {
        margin: 10px 0 0;
        font-size: 15px;
        line-height: 1.6;
        color: #475569;
      }

      .boot-splash__progress {
        height: 10px;
        margin-top: 22px;
        border-radius: 999px;
        background: #e2e8f0;
        overflow: hidden;
      }

      .boot-splash__progress::after {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #4f46e5 0%, #14b8a6 100%);
        animation: splashPulse 1.2s ease-in-out infinite;
      }

      @keyframes splashPulse {
        0%,
        100% {
          transform: translateX(0);
          opacity: 0.95;
        }

        50% {
          transform: translateX(130%);
          opacity: 0.75;
        }
      }
    </style>
    <title>Engineering Knowledge Vault</title>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash">
        <div class="boot-splash__card">
          <div class="boot-splash__mark">KV</div>
          <h1 class="boot-splash__title">Knowledge Vault</h1>
          <p class="boot-splash__subtitle">Preparing your offline engineering workspace and loading the local database engine.</p>
          <div class="boot-splash__progress"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
